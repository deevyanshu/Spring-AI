spring:
  application:
    name: "HelpDesk"
  datasource:
    url: jdbc:mysql://localhost:3306/help_desk
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
  ai:
    google:
      genai:
        api-key: ${GENAI_API_KEY}
        chat:
          options:
            model: gemini-3-flash-preview
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: ALWAYS
